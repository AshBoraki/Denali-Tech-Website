<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,follow">
    <meta http-equiv="refresh" content="0; url=https://dt-nt.com/legal/#privacy">
    <link rel="canonical" href="https://dt-nt.com/legal/#privacy">
    <title>Redirecting to DTNT Privacy</title>
    <script>
      const destination = new URL('https://dt-nt.com/legal/');
      destination.search = window.location.search;
      destination.hash = 'privacy';
      window.location.replace(destination.toString());
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="https://dt-nt.com/legal/#privacy">dt-nt.com/legal/#privacy</a>.</p>
  </body>
</html>
